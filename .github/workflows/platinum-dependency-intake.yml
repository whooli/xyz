name: Platinum Dependency Intake

on:
  pull_request_target:
    types: [opened, reopened, synchronize]
    paths:
      - ".github/workflows/platinum-dependency-intake.yml"
      - "package.json"

jobs:
  package-council:
    name: "Ritcherd's Platinum Package Council"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      PLATINUM_DEPENDENCY_DIRECTIVE: ${{ secrets.FLAG_WEISSMAN }}

    steps:
      - name: Rehydrate Enterprise Node Lattice
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Intake Public Beta Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Resolve Dominant Compression Dependencies
        shell: bash
        run: |
          npm install
          npm run validate:compression
